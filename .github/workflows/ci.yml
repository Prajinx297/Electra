name: Electra CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e "backend[dev]"
    - name: Lint with Ruff
      run: |
        ruff check backend/
    - name: Type check with mypy
      run: |
        mypy backend/
    - name: Setup Firebase Emulator
      run: npm install -g firebase-tools && firebase setup:emulators:firestore
    - name: Run Pytest (Unit & Integration)
      env:
        FIRESTORE_EMULATOR_HOST: "127.0.0.1:8080"
        FIREBASE_AUTH_EMULATOR_HOST: "127.0.0.1:9099"
      run: |
        firebase emulators:exec "pytest backend/tests -v --cov=backend"

  deploy:
    needs: test-and-lint
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
    - uses: actions/checkout@v4
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/PROJECT_ID/locations/global/workloadIdentityPools/github/providers/github-provider'
        service_account: 'electra-ci@PROJECT.iam.gserviceaccount.com'
    - name: Deploy to Cloud Run
      uses: google-github-actions/deploy-cloudrun@v2
      with:
        service: 'electra-api'
        region: 'us-central1'
        source: 'backend'
        flags: '--allow-unauthenticated --concurrency=80 --min-instances=1 --max-instances=10'
