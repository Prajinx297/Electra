name: ELECTRA CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend - Build, Lint, Test, Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run --prefix frontend type-check
      - run: npm run --prefix frontend lint
      - run: npm run --prefix frontend test -- --coverage --reporter=verbose
      - run: npm run --prefix frontend build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  backend:
    name: Backend - Lint, Type Check, Test, Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: pip install -r backend/requirements.txt
      - run: pip install ruff mypy pytest-cov
      - run: ruff check backend/
      - run: mypy backend/ --ignore-missing-imports
      - name: Run backend tests with coverage
        run: |
          cd backend
          pytest --cov=. --cov-report=xml --cov-fail-under=80
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

  e2e:
    name: E2E - Playwright Smoke Tests
    runs-on: ubuntu-latest
    needs: [frontend, backend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx --prefix frontend playwright install --with-deps chromium
      - run: npm run --prefix frontend test:e2e
        env:
          VITE_API_URL: http://localhost:8000
