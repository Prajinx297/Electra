[mypy]
python_version = 3.11
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_explicit = true
ignore_missing_imports = true
plugins = pydantic.mypy
disable_error_code = explicit-any, import-untyped, import-not-found

[mypy-google.*]
ignore_missing_imports = True

[mypy-firebase_admin.*]
ignore_missing_imports = True

[mypy-locust.*]
ignore_missing_imports = True

[mypy-backend.tests.*]
ignore_errors = True

[mypy-backend.locustfile]
ignore_errors = True
